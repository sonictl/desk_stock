<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>股票实时监控</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Microsoft Yahei"; margin: 20px; background: #f5f5f5; }
        .box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px #ccc; max-width: 1200px; }
        h3 { margin-top: 0; }
        .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
        .input-row input { width: 160px; padding: 6px; font-size: 14px; }
        .input-row input.small-input { width: 100px; }
        .input-row button { padding: 6px 16px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .input-row button:hover { background: #0052a3; }
        .input-row button.danger { background: #e74c3c; }
        .input-row button.danger:hover { background: #c0392b; }
        .input-row button.gray { background: #999; }
        .input-row button.gray:hover { background: #777; }
        .stock-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 36px; padding: 8px; background: #fafafa; border: 1px dashed #ddd; border-radius: 4px; }
        .stock-tag { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #e8f4fd; border: 1px solid #b3d8f0; border-radius: 4px; font-size: 13px; }
        .stock-tag .del { cursor: pointer; color: #e74c3c; font-weight: bold; font-size: 16px; line-height: 1; }
        .stock-tag .del:hover { color: #c0392b; }
        .controls { margin-bottom: 12px; }
        .controls button { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 8px; }
        .controls .start { background: #27ae60; color: #fff; }
        .controls .start:hover { background: #219a52; }
        .controls .stop { background: #999; color: #fff; }
        .controls .stop:hover { background: #777; }
        .status-bar { margin-bottom: 12px; padding: 8px 12px; background: #e8f4fd; border-radius: 4px; font-size: 14px; color: #333; display: none; }
        .status-bar.active { display: block; }
        .status-bar .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #00b42a; margin-right: 6px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .error-msg { color: #f53f3f; margin-bottom: 8px; padding: 8px; background: #fff0f0; border-radius: 4px; display: none; }
        .error-msg.show { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: center; font-size: 14px; }
        th { background: #eee; cursor: pointer; user-select: none; }
        th:hover { background: #ddd; }
        th .sort-arrow { margin-left: 4px; font-size: 12px; }
        th.sort-active { background: #d4e6f9; }
        .red { color: #f53f3f; }
        .green { color: #00b42a; }
        .gray { color: #666; }
        .flash-up { animation: flashGreen 0.6s; }
        .flash-down { animation: flashRed 0.6s; }
        @keyframes flashGreen { 0% { background: rgba(0, 180, 42, 0.3); } 100% { background: transparent; } }
        @keyframes flashRed { 0% { background: rgba(245, 63, 63, 0.3); } 100% { background: transparent; } }
        .empty-msg { color: #999; padding: 20px; text-align: center; }
        .del-row { cursor: pointer; color: #e74c3c; font-weight: bold; font-size: 18px; line-height: 1; padding: 0 4px; }
        .del-row:hover { color: #c0392b; }
        .input-hint { font-size: 12px; color: #999; }
        .summary-bar { display: inline-block; margin-left: 16px; padding: 8px 16px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; font-size: 14px; font-weight: bold; }
        .summary-bar .label { color: #856404; }
        .summary-bar .value { margin-left: 6px; }
        /* 列拖拽时的样式 */
        th.dragging { opacity: 0.5; }
        th.drag-over { background: #b3d8f0; }
        .sort-hint { font-size: 11px; color: #999; margin-left: 8px; font-weight: normal; }
        .name-cell { line-height: 1.4; }
        .name-cell .name { font-size: 14px; }
        .name-cell .market-value { font-size: 11px; color: #888; }
    </style>
</head>
<body>
    <div class="box">
        <h3>📈 股票实时监控</h3>

        <div class="input-row">
            <input type="text" id="codeInput" placeholder="输入6位股票代码" />
            <input type="number" id="costInput" class="small-input" placeholder="持仓成本(元)" step="0.01" min="0" />
            <input type="number" id="qtyInput" class="small-input" placeholder="持股数量(股)" step="1" min="0" />
            <button onclick="addStock()">➕ 添加</button>
            <span class="input-hint">持仓成本和持股数量非必填</span>
        </div>

        <div class="input-row">
            <input type="file" id="csvFileInput" accept=".csv" style="width:auto;padding:4px;font-size:13px;" />
            <button onclick="importCSV()" class="gray">📄 导入CSV</button>
            <span class="input-hint">CSV格式：代码,成本,数量（每行一只股票）</span>
        </div>

        <div class="stock-list" id="stockList"></div>

        <div class="controls">
            <button class="start" onclick="startMonitor()">▶ 开始监控</button>
            <button class="stop" onclick="stopMonitor()">⏹ 停止监控</button>
            <span class="summary-bar" id="summaryBar">
                <span class="label">📊 今日收益汇总：</span>
                <span class="value" id="summaryValue">0.00</span>
            </span>
        </div>

        <div class="status-bar" id="statusBar">
            <span class="dot"></span>
            <span id="statusText">正在实时刷新中...</span>
        </div>
        <div class="error-msg" id="errorMsg"></div>

        <table id="stockTableContainer">
            <thead>
                <tr id="headerRow">
                    <th data-field="操作" data-sortable="false">操作</th>
                    <th data-field="代码" data-type="string">代码</th>
                    <th data-field="名称/市值" data-type="number">名称/市值</th>
                    <th data-field="现价" data-type="number">现价</th>
                    <th data-field="涨跌额" data-type="number">涨跌额</th>
                    <th data-field="涨跌幅" data-type="number">涨跌幅</th>
                    <th data-field="今开" data-type="number">今开</th>
                    <th data-field="昨收" data-type="number">昨收</th>
                    <th data-field="最高" data-type="number">最高</th>
                    <th data-field="最低" data-type="number">最低</th>
                    <th data-field="持仓成本" data-type="number">持仓成本</th>
                    <th data-field="持股数量" data-type="number">持股数量</th>
                    <th data-field="持仓收益" data-type="number">持仓收益</th>
                    <th data-field="今日收益" data-type="number">今日收益</th>
                </tr>
            </thead>
            <tbody id="stockTable"></tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        // ===== 状态 =====
        let timer = null;
        let stockList = [];          // [{code: 'sz000001', display: '000001', cost: 10.5, quantity: 100}]
        let prevData = {};           // { 'sz000001': { price, change, ... } }
        let stockDataCache = {};     // { 'sz000001': { ... full data ... } }

        // 排序状态
        let sortField = null;        // 当前排序列的 data-field
        let sortOrder = 'asc';       // 'asc' 或 'desc'
        let columnOrder = [];        // 列顺序（存储 data-field 数组）

        // ===== localStorage 存储 =====
        const STORAGE_KEY = 'stock_monitor_list';
        const COLUMN_ORDER_KEY = 'stock_column_order';

        function saveStockList() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stockList));
        }

        function loadStockList() {
            let saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    stockList = JSON.parse(saved);
                } catch(e) {
                    stockList = [];
                }
            }
        }

        function saveColumnOrder() {
            localStorage.setItem(COLUMN_ORDER_KEY, JSON.stringify(columnOrder));
        }

        function loadColumnOrder() {
            let saved = localStorage.getItem(COLUMN_ORDER_KEY);
            if (saved) {
                try {
                    columnOrder = JSON.parse(saved);
                } catch(e) {
                    columnOrder = [];
                }
            }
        }

        // ===== DOM =====
        const codeInput = document.getElementById('codeInput');
        const costInput = document.getElementById('costInput');
        const qtyInput = document.getElementById('qtyInput');
        const csvFileInput = document.getElementById('csvFileInput');
        const stockListEl = document.getElementById('stockList');
        const stockTable = document.getElementById('stockTable');
        const headerRow = document.getElementById('headerRow');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const summaryValue = document.getElementById('summaryValue');
        const errorMsg = document.getElementById('errorMsg');

        // ===== 工具函数 =====
        function autoStockPrefix(codeNum) {
            let code = String(codeNum).padStart(6, '0');
            let first2 = code.substring(0, 2);
            let first3 = code.substring(0, 3);
            if (first2 === '60' || first2 === '68' || first2 === '50' || first2 === '51' || first2 === '58') {
                return 'sh' + code;
            } else if (first3 === '000' || first3 === '001' || first3 === '002' || first3 === '003' || first2 === '30') {
                return 'sz' + code;
            } else {
                return code;
            }
        }

        function normalizeCode(input) {
            let val = input.trim();
            if (!val) return null;
            if (/^\d+$/.test(val)) {
                return { code: autoStockPrefix(val), display: val };
            }
            return { code: val, display: val };
        }

        function showStatus(show) {
            statusBar.className = 'status-bar' + (show ? ' active' : '');
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        // GBK 解码
        function gbkDecode(buffer) {
            try { return new TextDecoder('gbk').decode(buffer); }
            catch(e) {
                try { return new TextDecoder('gb2312').decode(buffer); }
                catch(e2) { return new TextDecoder('utf-8').decode(buffer); }
            }
        }

        // ===== 列顺序管理 =====
        function initColumnOrder() {
            let ths = headerRow.querySelectorAll('th');
            let defaultOrder = Array.from(ths).map(th => th.getAttribute('data-field'));
            loadColumnOrder();
            if (columnOrder.length === defaultOrder.length && columnOrder.every(f => defaultOrder.includes(f))) {
                applyColumnOrder();
            } else {
                columnOrder = [...defaultOrder];
                saveColumnOrder();
            }
        }

        function applyColumnOrder() {
            let ths = headerRow.querySelectorAll('th');
            let thMap = {};
            ths.forEach(th => { thMap[th.getAttribute('data-field')] = th; });

            // 重新排列表头
            let fragment = document.createDocumentFragment();
            columnOrder.forEach(field => {
                if (thMap[field]) fragment.appendChild(thMap[field]);
            });
            headerRow.innerHTML = '';
            headerRow.appendChild(fragment);

            // 重新绑定点击事件
            bindSortHeaders();
        }

        // ===== 列拖拽排序（Sortable.js） =====
        let sortableInstance = null;

        function initColumnDrag() {
            if (sortableInstance) sortableInstance.destroy();
            sortableInstance = new Sortable(headerRow, {
                animation: 150,
                handle: 'th',
                draggable: 'th',
                onStart: function(evt) {
                    evt.item.classList.add('dragging');
                },
                onEnd: function(evt) {
                    evt.item.classList.remove('dragging');
                    // 更新 columnOrder
                    let ths = headerRow.querySelectorAll('th');
                    columnOrder = Array.from(ths).map(th => th.getAttribute('data-field'));
                    saveColumnOrder();
                    // 重新渲染表格以匹配新列顺序
                    if (timer) refreshTable();
                },
                onMove: function(evt) {
                    // 不允许拖动"操作"列
                    let field = evt.dragged.getAttribute('data-field');
                    if (field === '操作') return false;
                    // 不允许拖动到"操作"列前面
                    let targetField = evt.related.getAttribute('data-field');
                    if (targetField === '操作' && evt.willInsertAfter === false) return false;
                    return true;
                }
            });
        }

        // ===== 列排序 =====
        function bindSortHeaders() {
            let ths = headerRow.querySelectorAll('th');
            ths.forEach(th => {
                let field = th.getAttribute('data-field');
                let sortable = th.getAttribute('data-sortable');
                if (sortable === 'false') return;
                th.style.cursor = 'pointer';
                th.onclick = function() {
                    toggleSort(field);
                };
            });
            updateSortIndicators();
        }

        function toggleSort(field) {
            if (sortField === field) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortOrder = 'asc';
            }
            updateSortIndicators();
            if (timer) refreshTable();
        }

        function updateSortIndicators() {
            let ths = headerRow.querySelectorAll('th');
            ths.forEach(th => {
                let field = th.getAttribute('data-field');
                let arrow = th.querySelector('.sort-arrow');
                if (arrow) arrow.remove();
                th.classList.remove('sort-active');
                if (field === sortField) {
                    th.classList.add('sort-active');
                    let span = document.createElement('span');
                    span.className = 'sort-arrow';
                    span.textContent = sortOrder === 'asc' ? ' ▲' : ' ▼';
                    th.appendChild(span);
                }
            });
        }

        // ===== 获取排序值 =====
        function getSortValue(stock, data, field) {
            switch (field) {
                case '代码': return stock.display;
                case '名称/市值': {
                    if (stock.quantity != null && stock.quantity > 0 && data) {
                        return stock.quantity * data.price;
                    }
                    return -Infinity;
                }
                case '现价': return data ? data.price : 0;
                case '涨跌额': return data ? data.change : 0;
                case '涨跌幅': return data ? data.changePercent : 0;
                case '今开': return data ? data.open : 0;
                case '昨收': return data ? data.preClose : 0;
                case '最高': return data ? data.high : 0;
                case '最低': return data ? data.low : 0;
                case '持仓成本': return stock.cost != null ? stock.cost : -Infinity;
                case '持股数量': return stock.quantity != null ? stock.quantity : -Infinity;
                case '持仓收益': {
                    if (stock.cost != null && stock.quantity != null && stock.quantity > 0 && data) {
                        return (data.price - stock.cost) * stock.quantity;
                    }
                    return -Infinity;
                }
                case '今日收益': {
                    if (stock.quantity != null && stock.quantity > 0 && data) {
                        return (data.price - data.preClose) * stock.quantity;
                    }
                    return data ? data.change : -Infinity;
                }
                default: return 0;
            }
        }

        // ===== 股票列表管理 =====
        function renderStockList() {
            if (stockList.length === 0) {
                stockListEl.innerHTML = '<span style="color:#999;font-size:13px;">暂无股票，请输入代码添加</span>';
                return;
            }
            stockListEl.innerHTML = stockList.map((item, idx) => {
                let extra = '';
                if (item.cost != null && item.quantity != null) {
                    extra = ` (成本:${item.cost} 数量:${item.quantity})`;
                }
                return `<span class="stock-tag">
                    ${item.display}${extra}
                    <span class="del" onclick="removeStock(${idx})">×</span>
                </span>`;
            }).join('');
        }

        function addStock() {
            let normalized = normalizeCode(codeInput.value);
            if (!normalized) { showError('请输入股票代码'); return; }
            // 去重
            if (stockList.some(s => s.code === normalized.code)) {
                showError('该股票已添加');
                return;
            }

            // 读取持仓成本和持股数量（非必填）
            let costVal = costInput.value.trim();
            let qtyVal = qtyInput.value.trim();
            let cost = costVal !== '' ? parseFloat(costVal) : null;
            let quantity = qtyVal !== '' ? parseInt(qtyVal) : null;

            // 如果只填了其中一个，提示用户
            if ((costVal !== '' && qtyVal === '') || (costVal === '' && qtyVal !== '')) {
                showError('持仓成本和持股数量需同时填写或不填');
                return;
            }

            // 校验数值合法性
            if (cost !== null && (isNaN(cost) || cost < 0)) {
                showError('持仓成本请输入有效正数');
                return;
            }
            if (quantity !== null && (isNaN(quantity) || quantity < 0)) {
                showError('持股数量请输入有效正整数');
                return;
            }

            stockList.push({
                ...normalized,
                cost: cost,
                quantity: quantity
            });
            saveStockList();
            renderStockList();
            codeInput.value = '';
            costInput.value = '';
            qtyInput.value = '';
            codeInput.focus();
        }

        function removeStock(idx) {
            stockList.splice(idx, 1);
            saveStockList();
            renderStockList();
            if (timer) refreshTable();
        }

        function removeStockByCode(code) {
            let idx = stockList.findIndex(s => s.code === code);
            if (idx !== -1) {
                stockList.splice(idx, 1);
                saveStockList();
                renderStockList();
                if (timer) refreshTable();
            }
        }

        // ===== CSV 导入 =====
        function importCSV() {
            let file = csvFileInput.files[0];
            if (!file) {
                showError('请先选择CSV文件');
                return;
            }

            let reader = new FileReader();
            reader.onload = function(e) {
                let text = e.target.result;
                let lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                let addedCount = 0;
                let skipCount = 0;
                let errorLines = [];

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    // 跳过可能的表头行（包含非数字的列名）
                    if (i === 0 && /代码|code|成本|cost|数量|qty|quantity/i.test(line)) {
                        continue;
                    }

                    let parts = line.split(',');
                    if (parts.length < 1) continue;

                    let codeStr = parts[0].trim();
                    let costStr = parts.length > 1 ? parts[1].trim() : '';
                    let qtyStr = parts.length > 2 ? parts[2].trim() : '';

                    // 解析代码
                    let normalized = normalizeCode(codeStr);
                    if (!normalized) {
                        errorLines.push(`第${i+1}行: 无效代码 "${codeStr}"`);
                        continue;
                    }

                    // 去重
                    if (stockList.some(s => s.code === normalized.code)) {
                        skipCount++;
                        continue;
                    }

                    // 解析成本和数量
                    let cost = costStr !== '' ? parseFloat(costStr) : null;
                    let quantity = qtyStr !== '' ? parseInt(qtyStr) : null;

                    // 如果只填了其中一个，跳过
                    if ((costStr !== '' && qtyStr === '') || (costStr === '' && qtyStr !== '')) {
                        errorLines.push(`第${i+1}行: 成本和数量需同时填写或不填`);
                        continue;
                    }

                    // 校验数值
                    if (cost !== null && (isNaN(cost) || cost < 0)) {
                        errorLines.push(`第${i+1}行: 无效成本 "${costStr}"`);
                        continue;
                    }
                    if (quantity !== null && (isNaN(quantity) || quantity < 0)) {
                        errorLines.push(`第${i+1}行: 无效数量 "${qtyStr}"`);
                        continue;
                    }

                    stockList.push({
                        ...normalized,
                        cost: cost,
                        quantity: quantity
                    });
                    addedCount++;
                }

                saveStockList();
                renderStockList();

                let msg = `导入完成：成功添加 ${addedCount} 只股票`;
                if (skipCount > 0) msg += `，${skipCount} 只已存在已跳过`;
                if (errorLines.length > 0) msg += `，${errorLines.length} 行有错误`;
                showError(msg);

                // 如果有错误，在控制台输出详细信息
                if (errorLines.length > 0) {
                    console.log('CSV导入错误详情：');
                    errorLines.forEach(l => console.log(l));
                }

                // 清空文件选择
                csvFileInput.value = '';
            };
            reader.readAsText(file);
        }

        // ===== 数据获取 =====
        async function getStockData(code) {
            try {
                let response = await fetch('https://qt.gtimg.cn/q=' + code);
                if (!response.ok) return null;
                let buffer = await response.arrayBuffer();
                let text = gbkDecode(buffer);
                let match = text.match(/="(.+)";/);
                if (!match) return null;
                let arr = match[1].split('~');
                if (arr.length < 35) return null;
                return {
                    code: arr[2],
                    name: arr[1],
                    price: parseFloat(arr[3]),
                    preClose: parseFloat(arr[4]),
                    open: parseFloat(arr[5]),
                    change: parseFloat(arr[31]),
                    changePercent: parseFloat(arr[32]),
                    high: parseFloat(arr[33]),
                    low: parseFloat(arr[34])
                };
            } catch(e) {
                return null;
            }
        }

        // ===== 刷新表格（仅数据变化时更新） =====
        async function refreshTable() {
            if (stockList.length === 0) {
                stockTable.innerHTML = '<tr><td colspan="14" class="empty-msg">请添加股票代码后开始监控</td></tr>';
                return;
            }

            let codes = stockList.map(s => s.code);
            let htmlRows = '';
            let hasAnyData = false;

            // 先获取所有数据
            for (let i = 0; i < stockList.length; i++) {
                let stock = stockList[i];
                let code = stock.code;
                let data = await getStockData(code);
                if (data) {
                    stockDataCache[code] = data;
                    hasAnyData = true;
                }
            }

            // 构建行数据数组
            let rows = [];
            for (let i = 0; i < stockList.length; i++) {
                let stock = stockList[i];
                let code = stock.code;
                let data = stockDataCache[code];
                if (!data) {
                    rows.push({ stock, data: null, html: `<tr><td><span class="del-row" onclick="removeStockByCode('${code}')">×</span></td><td>${code}</td><td colspan="12" style="color:#999;">获取数据失败</td></tr>` });
                    continue;
                }

                let priceClass = data.change > 0 ? 'red' : (data.change < 0 ? 'green' : 'gray');
                let prev = prevData[code];

                // 判断是否有变化
                let isChanged = false;
                if (!prev || prev.price !== data.price || prev.change !== data.change || prev.changePercent !== data.changePercent) {
                    isChanged = true;
                }

                // 记录当前数据（包含 preClose 用于汇总计算）
                prevData[code] = { price: data.price, change: data.change, changePercent: data.changePercent, preClose: data.preClose };

                // 闪烁效果：仅数据变化时添加 flash 类
                let flashClass = '';
                if (isChanged && prev) {
                    flashClass = data.change > 0 ? ' flash-up' : (data.change < 0 ? ' flash-down' : '');
                }

                // 计算持仓收益
                let profitDisplay = '-';
                let profitClass = 'gray';
                if (stock.cost != null && stock.quantity != null && stock.quantity > 0) {
                    let profit = (data.price - stock.cost) * stock.quantity;
                    profitDisplay = profit.toFixed(2);
                    profitClass = profit > 0 ? 'red' : (profit < 0 ? 'green' : 'gray');
                }

                // 计算今日收益 = (现价 - 昨收) × 持股数量（若有持股数量），否则显示涨跌额
                let todayProfitDisplay = '-';
                let todayProfitClass = 'gray';
                if (stock.quantity != null && stock.quantity > 0) {
                    let todayProfit = (data.price - data.preClose) * stock.quantity;
                    todayProfitDisplay = todayProfit.toFixed(2);
                    todayProfitClass = todayProfit > 0 ? 'red' : (todayProfit < 0 ? 'green' : 'gray');
                } else {
                    todayProfitDisplay = data.change.toFixed(2);
                    todayProfitClass = priceClass;
                }

                // 计算市值 = 持股数量 × 现价
                let marketValueDisplay = '-';
                if (stock.quantity != null && stock.quantity > 0) {
                    let marketValue = stock.quantity * data.price;
                    marketValueDisplay = marketValue.toFixed(2);
                }

                // 按 columnOrder 构建列数据
                let colData = {};
                colData['操作'] = `<span class="del-row" onclick="removeStockByCode('${code}')">×</span>`;
                colData['代码'] = data.code;
                colData['名称/市值'] = `<div class="name-cell"><div class="name">${data.name}</div><div class="market-value">市值: ${marketValueDisplay}</div></div>`;
                colData['现价'] = `<span class="${priceClass}">${data.price.toFixed(2)}</span>`;
                colData['涨跌额'] = `<span class="${priceClass}">${data.change.toFixed(2)}</span>`;
                colData['涨跌幅'] = `<span class="${priceClass}">${data.changePercent.toFixed(2)}%</span>`;
                colData['今开'] = data.open.toFixed(2);
                colData['昨收'] = data.preClose.toFixed(2);
                colData['最高'] = data.high.toFixed(2);
                colData['最低'] = data.low.toFixed(2);
                colData['持仓成本'] = stock.cost != null ? stock.cost.toFixed(2) : '-';
                colData['持股数量'] = stock.quantity != null ? stock.quantity : '-';
                colData['持仓收益'] = `<span class="${profitClass}">${profitDisplay}</span>`;
                colData['今日收益'] = `<span class="${todayProfitClass}">${todayProfitDisplay}</span>`;

                rows.push({ stock, data, colData, flashClass });
            }

            // 排序
            if (sortField && sortField !== '操作') {
                rows.sort((a, b) => {
                    let va = getSortValue(a.stock, a.data, sortField);
                    let vb = getSortValue(b.stock, b.data, sortField);
                    if (va === -Infinity) return 1;
                    if (vb === -Infinity) return -1;
                    if (typeof va === 'string') {
                        return sortOrder === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
                    }
                    return sortOrder === 'asc' ? va - vb : vb - va;
                });
            }

            // 生成 HTML
            rows.forEach(row => {
                let cols = columnOrder.map(field => {
                    if (row.colData && row.colData[field]) return `<td>${row.colData[field]}</td>`;
                    return '<td></td>';
                }).join('');
                htmlRows += `<tr class="${row.flashClass}">${cols}</tr>`;
            });

            stockTable.innerHTML = htmlRows;

            // 计算今日收益汇总（仅统计有持股数量的股票）
            let totalTodayProfit = 0;
            let hasProfitData = false;
            for (let i = 0; i < stockList.length; i++) {
                let stock = stockList[i];
                let code = stock.code;
                let data = prevData[code];
                if (data && stock.quantity != null && stock.quantity > 0) {
                    let todayProfit = (data.price - data.preClose) * stock.quantity;
                    totalTodayProfit += todayProfit;
                    hasProfitData = true;
                }
            }
            if (hasProfitData) {
                summaryValue.textContent = totalTodayProfit.toFixed(2);
                summaryValue.style.color = totalTodayProfit > 0 ? '#f53f3f' : (totalTodayProfit < 0 ? '#00b42a' : '#856404');
            } else {
                summaryValue.textContent = '0.00';
                summaryValue.style.color = '#856404';
            }

            if (!hasAnyData) {
                showError('所有股票数据获取失败，请检查网络或股票代码');
            }
        }

        // ===== 开始/停止监控 =====
        function startMonitor() {
            if (stockList.length === 0) {
                showError('请先添加至少一个股票代码');
                return;
            }
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            showStatus(true);
            statusText.textContent = '正在实时刷新中...';
            refreshTable();
            timer = setInterval(refreshTable, 1000);
        }

        function stopMonitor() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            showStatus(false);
            statusText.textContent = '已停止';
        }

        // 回车添加
        codeInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addStock();
        });
        costInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addStock();
        });
        qtyInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addStock();
        });

        // ===== 初始化 =====
        loadStockList();
        renderStockList();
        initColumnOrder();
        initColumnDrag();
        bindSortHeaders();
        stockTable.innerHTML = '<tr><td colspan="14" class="empty-msg">请添加股票代码后开始监控</td></tr>';
    </script>
</body>
</html>
